<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <link rel="icon" type="image/png" href="/static/favicon.png" />
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
    <main class="container">
        <header class="card">
            <h1>Plot Bunny</h1>
            <p class="hint">上传数据并生成曲线图。</p>
        </header>

        <section class="card">
            <h2>上传数据</h2>
            <form id="upload-form">
                <div class="row">
                    <label for="dataset-name">数据集名称</label>
                    <input id="dataset-name" name="name" type="text" required />
                </div>
                <div class="row">
                    <label for="dataset-file">CSV/XLSX 文件</label>
                    <input id="dataset-file" name="file" type="file" accept=".csv,.xlsx" required />
                </div>
                <div class="row" id="sheet-row" style="display: none;">
                    <label for="sheet-name">Excel Sheet</label>
                    <select id="sheet-name" name="sheet_name"></select>
                </div>
                <button type="submit">上传并解析</button>
            </form>
            <p id="upload-message" class="hint"></p>

            <h3>文件预览（前12行）</h3>
            <p id="preview-message" class="hint"></p>
            <table id="preview-table">
                <thead></thead>
                <tbody></tbody>
            </table>
        </section>

        <section class="card">
            <details class="format-panel">
                <summary class="format-panel-summary">数据集<span class="format-panel-hint">（可折叠）</span></summary>
                <div class="format-panel-body">
                    <div class="row">
                        <button id="refresh-datasets">刷新列表</button>
                    </div>
                    <table id="datasets-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>名称</th>
                                <th>行数</th>
                                <th>列数</th>
                                <th>字段</th>
                                <th>创建时间</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </details>
        </section>

        <section class="card">
            <h2>分析与作图</h2>
            <p id="current-dataset-message" class="hint">当前数据集：未选择</p>

            <h3>生成时间双Y轴曲线图</h3>
            <div class="row">
                <label for="time-column">时间列</label>
                <select id="time-column"></select>
            </div>
            <div class="row">
                <label for="left-y-column">左Y轴列(温度)</label>
                <div class="y-group">
                    <div id="left-y-groups" class="y-groups"></div>
                    <button type="button" id="btn-add-left-group" class="btn-secondary">增加数据组</button>
                    <span class="hint" style="margin:0;">最多 10 组</span>
                </div>
            </div>
            <div class="row">
                <label for="right-y-column">右Y轴列(压力)</label>
                <div class="y-group">
                    <div id="right-y-groups" class="y-groups"></div>
                    <button type="button" id="btn-add-right-group" class="btn-secondary">增加数据组</button>
                    <span class="hint" style="margin:0;">最多 10 组</span>
                </div>
            </div>

            <details class="format-panel">
                <summary class="format-panel-summary">图表格式<span class="format-panel-hint">（可折叠）</span></summary>
                <div class="format-panel-body">
            <div class="row">
                <button type="button" id="btn-reset-chart-format">恢复默认格式</button>
                <span class="hint" style="margin:0;">重置范围/刻度/颜色</span>
            </div>
            <p class="hint">留空=自动；时间范围需同时填起止。</p>
            <div class="format-grid">
                <div class="format-item format-item-full">
                    <label for="fmt-title">图表标题</label>
                    <input id="fmt-title" type="text" placeholder="可选" />
                </div>
                <div class="format-item">
                    <label for="fmt-x-title">X轴标题</label>
                    <input id="fmt-x-title" type="text" placeholder="可选" />
                </div>
                <div class="format-item">
                    <label for="fmt-y-left-title">左Y轴标题</label>
                    <input id="fmt-y-left-title" type="text" placeholder="可选" />
                </div>
                <div class="format-item">
                    <label for="fmt-y-right-title">右Y轴标题</label>
                    <input id="fmt-y-right-title" type="text" placeholder="可选" />
                </div>
                <div class="format-item">
                    <label for="fmt-x-min">时间轴下限</label>
                    <input id="fmt-x-min" type="text" placeholder="与数据时间格式一致" />
                </div>
                <div class="format-item">
                    <label for="fmt-x-max">时间轴上限</label>
                    <input id="fmt-x-max" type="text" placeholder="与数据时间格式一致" />
                </div>
                <div class="format-item">
                    <label for="fmt-x-dtick">时间刻度间隔(小时)</label>
                    <input id="fmt-x-dtick" type="number" step="any" min="0" placeholder="例如 6" />
                </div>
                <div class="format-item">
                    <label for="fmt-y-left-min">左Y下限</label>
                    <input id="fmt-y-left-min" type="number" step="any" placeholder="可选" />
                </div>
                <div class="format-item">
                    <label for="fmt-y-left-max">左Y上限</label>
                    <input id="fmt-y-left-max" type="number" step="any" placeholder="可选" />
                </div>
                <div class="format-item">
                    <label for="fmt-y-left-dtick">左Y刻度间隔</label>
                    <input id="fmt-y-left-dtick" type="number" step="any" min="0" placeholder="可选" />
                </div>
                <div class="format-item">
                    <label for="fmt-y-right-min">右Y下限</label>
                    <input id="fmt-y-right-min" type="number" step="any" placeholder="可选" />
                </div>
                <div class="format-item">
                    <label for="fmt-y-right-max">右Y上限</label>
                    <input id="fmt-y-right-max" type="number" step="any" placeholder="可选" />
                </div>
                <div class="format-item">
                    <label for="fmt-y-right-dtick">右Y刻度间隔</label>
                    <input id="fmt-y-right-dtick" type="number" step="any" min="0" placeholder="可选" />
                </div>
                <div class="format-item format-item-full">
                    <label>曲线颜色设置</label>
                    <div>
                        <p class="hint" style="margin:0 0 6px 0;">按曲线设置颜色</p>
                        <div id="series-color-settings" class="series-color-settings"></div>
                    </div>
                </div>
            </div>
                </div>
            </details>

            <button id="btn-plot">生成图表</button>
            <p id="plot-message" class="hint"></p>
            <iframe id="plot-frame" title="plot result"></iframe>
        </section>
    </main>

    <footer class="page-footer">Copyright © 2026 Ada Shen. All Rights Reserved.</footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
