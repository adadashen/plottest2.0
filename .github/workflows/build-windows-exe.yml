name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      # 仅为消除 Node20 弃用警告/提前兼容，非失败原因
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip --version
          pip install -r requirements.txt
          pip install pyinstaller
          python -c "import sys; print('python', sys.version)"
          python -c "import webview; print('pywebview ok')"

      - name: Verify build spec exists
        shell: pwsh
        run: |
          Write-Host "Repo root:" (Get-Location)
          Write-Host "List packaging\\windows:"
          Get-ChildItem -Force packaging\\windows | Format-Table Name,Length
          if (-not (Test-Path packaging\\windows\\plotbunny.spec)) {
            Write-Error "Spec file not found: packaging\\windows\\plotbunny.spec"
            exit 1
          }
          Write-Host "=== Head of plotbunny.spec ==="
          Get-Content packaging\\windows\\plotbunny.spec -TotalCount 40
          Write-Host "=== End head ==="

      - name: Build (PyInstaller onefile, no console)
        run: |
          pyinstaller --version
          pyinstaller --clean --noconfirm packaging/windows/plotbunny.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlotBunny-Windows-EXE
          path: dist/PlotBunny.exe

